
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Picker</title>
    <link rel="stylesheet" href="leaflet.min.css" />
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #e9eef5;
            font-family: Segoe UI, sans-serif;
        }
        .map-note {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.92);
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #cfd8e3;
            box-shadow: 0 10px 24px rgba(34, 51, 84, 0.12);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="map-note">Click anywhere on the map to choose coordinates.</div>
    <div id="map"></div>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="leaflet.min.js"></script>
    <script>
        console.log('JS running. L defined:', typeof L);
        const initialLat = -23.00000000;
        const initialLon = 150.00000000;

        // Fix default marker icon paths to local files
        delete L.Icon.Default.prototype._getIconUrl;
        L.Icon.Default.mergeOptions({
            iconUrl: 'marker-icon.png',
            iconRetinaUrl: 'marker-icon-2x.png',
            shadowUrl: 'marker-shadow.png',
        });

        const map = L.map('map').setView([initialLat, initialLon], 6);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let marker = L.marker([initialLat, initialLon], { draggable: true }).addTo(map);
        let bridge = null;

        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
            if (bridge) bridge.pickPoint(initialLat, initialLon);
        });

        function report(lat, lon) {
            if (bridge) bridge.pickPoint(lat, lon);
        }

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            report(e.latlng.lat, e.latlng.lng);
        });

        marker.on('dragend', function(e) {
            const pos = e.target.getLatLng();
            report(pos.lat, pos.lng);
        });
    </script>
</body>
</html>
